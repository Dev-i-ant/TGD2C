services:
  # Next.js Web Application
  web:
    container_name: TGD2OC_web
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=file:/app/dev.db
        - NEXT_PUBLIC_APP_URL=https://back-loot.ru
        - NEXT_PUBLIC_BOT_USERNAME=back_loot_bot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/dev.db
      - NEXT_PUBLIC_APP_URL=https://back-loot.ru
      - NEXT_PUBLIC_BOT_USERNAME=Open_My_Case_bot
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "node", "-e", "const http = require('http'); const options = { hostname: 'localhost', port: 3000, path: '/', method: 'GET', timeout: 2000 }; const req = http.request(options, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => { process.exit(1); }); req.end();" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Telegram Bot
  bot:
    container_name: TGD2OC_bot
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - TELEGRAM_BOT_TOKEN=8291787927:AAGAKyE_B8xjoT5r_Ogwj2Otv2A_93qWiQA
      - NEXT_PUBLIC_APP_URL=https://back-loot.ru
      - DATABASE_URL=file:/app/dev.db
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    name: TGD2OC_network
    driver: bridge
