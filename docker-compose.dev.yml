services:
  # Next.js Web Application (DEV)
  web-dev:
    container_name: TGD2OC_web_dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=file:/app/prisma/dev.db
        - NEXT_PUBLIC_APP_URL=https://back-loot.online
        - NEXT_PUBLIC_BOT_USERNAME=back_loot_bot
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    env_file:
      - .env
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped
    networks:
      - dev-network
    healthcheck:
      test: [ "CMD", "node", "-e", "const http = require('http'); const options = { hostname: 'localhost', port: 3000, path: '/', method: 'GET', timeout: 2000 }; const req = http.request(options, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => { process.exit(1); }); req.end();" ]
      interval: 10s
      timeout: 5s
      retries: 3

  # Telegram Bot (DEV)
  bot-dev:
    container_name: TGD2OC_bot_dev
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    env_file:
      - .env
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped
    depends_on:
      web-dev:
        condition: service_healthy
    networks:
      - dev-network

networks:
  dev-network:
    name: TGD2OC_network_dev
    driver: bridge
