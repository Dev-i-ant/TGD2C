version: '3.8'

services:
  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_BOT_USERNAME=${NEXT_PUBLIC_BOT_USERNAME}
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    networks:
      - app-network

  # Telegram Bot
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - app-network

  # Cloudflare Tunnel (optional, for local development)
  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --url http://web:3000 --protocol http2
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
