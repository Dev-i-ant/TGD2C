services:
  # Next.js Web Application
  web:
    container_name: TGD2OC_web
    build:
      context: .
      dockerfile: infra/docker/Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - NEXT_PUBLIC_BOT_USERNAME=${NEXT_PUBLIC_BOT_USERNAME}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_BOT_USERNAME=${NEXT_PUBLIC_BOT_USERNAME}
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://0.0.0.0:3000" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Telegram Bot
  bot:
    container_name: TGD2OC_bot
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./prisma:/app/prisma
      - ./dev.db:/app/dev.db
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app-network

  # Cloudflare Tunnel (Persistent)
  tunnel:
    container_name: TGD2OC_tunnel
    image: cloudflare/cloudflared:latest
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    name: TGD2OC_network
    driver: bridge
